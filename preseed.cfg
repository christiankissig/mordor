# Debian 13 (Trixie) preseed — unattended install for Mordor appliance

# Locale & keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network — use DHCP
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string mordor-appliance
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock & timezone
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Partitioning — single ext4 root
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-basicfilesystems/no_swap boolean false

# User account — matches Packer ssh_username / ssh_password variables
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Mordor
d-i passwd/username string mordor
d-i passwd/user-password password mordor
d-i passwd/user-password-again password mordor
d-i passwd/user-default-groups string sudo audio cdrom video

# Package selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string sudo curl openssh-server ca-certificates
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

# late_command — runs inside the installed system before first reboot:
#   1. Enable sshd
#   2. Drop a sshd_config.d snippet to force password auth on (Debian 13
#      disables it by default; the snippet overrides the main config file)
d-i preseed/late_command string \
    in-target systemctl enable ssh.service; \
    in-target bash -c "echo 'PasswordAuthentication yes' > /etc/ssh/sshd_config.d/99-packer.conf"; \
    in-target bash -c "echo 'PermitRootLogin no' >> /etc/ssh/sshd_config.d/99-packer.conf"; \
    in-target chmod 644 /etc/ssh/sshd_config.d/99-packer.conf

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default

# Finish without manual intervention
d-i finish-install/reboot_in_progress note
d-i finish-install/keep-consoles boolean false
